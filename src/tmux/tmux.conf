# tmux settings
# http://www.openbsd.org/cgi-bin/man.cgi/OpenBSD-current/man1/tmux.1#x4f5054494f4e53
# http://www.unwiredcouch.com/2013/11/15/my-tmux-setup.html
# https://gist.github.com/spicycode/1229612

# ----------------------------------------------------------------------
# | General Settings                                                   |
# ----------------------------------------------------------------------

# Disable mouse mode by default(tmux 2.1 and above)
set -g mouse off

# don't rename windows automatically
#set-option -g allow-rename off

# If on, when a window is closed in a session, automatically renumber the other windows in numerical order.
# If off, do not renumber the windows
set -g renumber-windows on

# Make window index start at 1
set -g base-index 1

# Make pane index start at 1
setw -g pane-base-index 1

# Remove delay when sending commands
# (default is 500 milliseconds)
set -sg escape-time 1


# ----------------------------------------------------------------------
# | Key Mappings                                                       |
# ----------------------------------------------------------------------

# Change the key combination for the PREFIX key to `ctrl-a`
set -g prefix C-a
unbind-key C-b

# Make tmux send the PREFIX to an application running
# within tmux simply by pressing PREFIX key twice
bind C-a send-prefix

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Workaround for accessing macOS' pasteboard
# https://github.com/ChrisJohnsen/tmux-MacOSX-pasteboard

if-shell \
    'test "$(uname -s)" = Darwin' \
    'set-option -g default-command "reattach-to-user-namespace -l $SHELL"'

# Remap the copy & paste keys to work as in vim
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
#bind -t vi-copy "v" begin-selection
#bind -t vi-copy "y" copy-selection

bind-key -T copy-mode-vi v send-keys -X begin-selection
#bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# [ PREFIX + c ] Create a window in the current pane's directory
bind c new-window -c "#{pane_current_path}"

# [ PREFIX + - ] Split window horizontally
bind - split-window -v -c "#{pane_current_path}"

# [ PREFIX + | ] Split window vertically
bind | split-window -h -c "#{pane_current_path}"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# [ PREFIX + h/j/k/l ] Move from pane to pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# [ Alt + h/j/k/l ] Move from pane to pane
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# [ Alt + Left/Right/Up/Down ] Move from pane to pane
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# [ PREFIX + H/J/K/L ] Resize pane
bind -r H resize-pane -L
bind -r J resize-pane -D
bind -r K resize-pane -U
bind -r L resize-pane -R

# [ Shift + Left/Right ] Switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# [ PREFIX + r ] Reload tmux config
bind r source-file ~/.tmux.conf \; display "tmux configs reloaded"

# [ PREFIX + m/M] to turn mouse mode off/on so copy and paste work
bind m set -g mouse off \; display "Mouse: OFF"
bind M set -g mouse on \; display "Mouse: ON"

# [ PREFIX + y ] Toggle synchronize panes
bind y setw synchronize-panes \; display "Toggle Synchronize Panes"
# ----------------------------------------------------------------------
# | Status bar                                                         |
# ----------------------------------------------------------------------

# Notified when something happens in one of the other windows
setw -g monitor-activity on
set -g visual-activity on

# Periodically refresh the status bar
set -g status-interval 60

# Customize what is displayed
set -g status-justify left
set -g status-left-length 50
set -g status-left " #S / "
#                     └─ current session name
set -g status-right " #{prefix_highlight} #{battery_icon} #{battery_percentage} | %a %h-%d %H:%M "
# %R = current time
# %a = current day of the week
# %h = current month of the year
# %d = current day of the month
# %H = current hour of the day
# %M = current minute of the hour

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Default colors
set -g status-bg green
set -g status-fg black

# Colors for window list
# setw -g window-status-fg black
# setw -g window-status-bg green
# #setw -g window-status-attr dim
setw -g window-status-style fg=black,bg=green,dim

# Colors for active window
# setw -g window-status-current-fg black
# setw -g window-status-current-bg yellow
# #setw -g window-status-current-attr dim
setw -g window-status-current-style fg=black,bg=yellow,dim


# ----------------------------------------------------------------------
# | Visual Styling                                                     |
# ----------------------------------------------------------------------

# Display things in 256 colors
set -g default-terminal "screen-256color"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Command Line
# set -g message-fg black
# set -g message-bg green
# #set -g message-attr dim
set -g message-style fg=black,bg=green,dim

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Pane divider
# set -g pane-active-border-bg default
# set -g pane-active-border-fg green
# set -g pane-border-bg default
# set -g pane-border-fg colour244
set -g pane-active-border-style fg=green,bg=default
set -g pane-border-style fg=colour244,bg=default

# ----------------------------------------------------------------------
# | Nested tmux mode (Prefix + F12)                                    |
# ----------------------------------------------------------------------
#
# Useful when connecting to a remote host that is also running
# tmux, e.g.
#
#   Local tmux
#     └─ ssh server
#          └─ remote tmux
#
# Normally you'd need:
#
#   Prefix Prefix c
#
# to create a window in the remote tmux.
#
# With this enabled:
#
#   Prefix F12
#
# puts the local tmux into "OFF" mode so all key presses are
# sent directly to the remote tmux.
#
# Press:
#
#   F12
#
# to return to normal operation.
#
# Reference: https://www.youtube.com/channel/UCTfS-XQGhM__ifiH9w4oAAw
#

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Enter nested mode: Prefix + F12
bind F12 \
    set prefix None \;\
    set key-table off \;\
    set -g status-bg colour236 \;\
    set -g status-fg colour252 \;\
    set -g status-left '#[fg=black,bg=colour250,bold] OFF #[fg=colour252,bg=colour236] #S / ' \;\
    setw -g window-status-style fg=colour245,bg=colour236 \;\
    setw -g window-status-current-style fg=black,bg=colour250,bold \;\
    refresh-client -S \;\
    display-message "Nested tmux mode: ON"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Exit nested mode: F12
bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -g status-bg green \;\
    set -g status-fg black \;\
    set -g status-left ' #S / ' \;\
    setw -g window-status-style fg=black,bg=green,dim \;\
    setw -g window-status-current-style fg=black,bg=yellow,dim \;\
    refresh-client -S \;\
    display-message "Nested tmux mode: OFF"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Keep your existing status-right, with [OFF] added
set -g status-right '#{?#{==:#{client_key_table},off},[OFF] ,} #{prefix_highlight} #{battery_icon} #{battery_percentage} | %a %h-%d %H:%M '

# ----------------------------------------------------------------------
# | Tmux Plugin Manager                                                |
# ----------------------------------------------------------------------

# List of plugins to install via tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sidebar'

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# tmux prefix highlight settings

set -g @prefix_highlight_fg 'white'    # default is 'colour231'
set -g @prefix_highlight_bg 'colour22' # default is 'colour04'

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# tmux resurrect settings

# See https://github.com/tmux-plugins/tmux-resurrect/blob/master/docs/restoring_vim_and_neovim_sessions.md
# Used in conjunctin with vim plugin https://github.com/tpope/vim-obsession
set -g @resurrect-strategy-vim 'session'    # turn this off if it seems to create lots of tmux session when restoring
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
# set -g @resurrect-save-bash-history 'on'    # turned off because it seems to clear contents of all panes due there being a clear within my bashrc profile

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
